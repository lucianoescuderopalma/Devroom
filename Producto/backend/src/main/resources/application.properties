# ── App ───────────────────────────────────────
spring.application.name=backend

# ── Servidor ──────────────────────────────────
server.port=8080

# ── PostgreSQL ────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/devroom_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:devroom123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Static Resources (Frontend) ────────────────
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=31536000

# ── Autoconfigure exclusions ──────────────────
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration,\
  org.springframework.ai.vectorstore.redis.autoconfigure.RedisVectorStoreAutoConfiguration

# ── GitHub OAuth ──────────────────────────────
github.client-id=${GITHUB_CLIENT_ID:Ov23liOZ8Db9SFAgin3l}
github.client-secret=${GITHUB_CLIENT_SECRET:f73be3bf288fa991da00d766df6fc4386aef7cea}
github.redirect-uri=${GITHUB_REDIRECT_URI:https://devroom-six.vercel.app/auth/callback}


# ── Frontend URL ──────────────────────────────
frontend.url=${FRONTEND_URL:https://devroom-six.vercel.app}

# ── JWT ───────────────────────────────────────
jwt.secret=${JWT_SECRET:devroom-super-secret-key-2024-cambiar-en-produccion}
jwt.expiration=86400000

# ── OpenAI ────────────────────────────────────
openai.api-key=${OPENAI_API_KEY:TU_OPENAI_KEY_AQUI}
openai.model=gpt-4o-mini
