<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>CV</title>
  <style>
    body { font-family: system-ui, sans-serif; font-size: 12px; margin: 32px; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    h2 { font-size: 16px; margin-top: 18px; margin-bottom: 6px; }
    .headline { color: #555; margin-bottom: 12px; }
    .section { margin-bottom: 12px; }
    .skill-pill { display: inline-block; margin: 2px 4px 2px 0; padding: 2px 6px;
                  border-radius: 4px; background: #f3f4f6; font-size: 10px; }
  </style>
</head>
<body>
  <h1>{{fullName}}</h1>
  <div class="headline">{{headline}}</div>
  <div>{{location}}</div>

  <h2>Resumen</h2>
  <div class="section">
    {{summary}}
  </div>

  <h2>Skills</h2>
  <div class="section">
    {{skills}}
  </div>

  <h2>Proyectos</h2>
  <div class="section">
    {{projects}}
  </div>
</body>
</html>
